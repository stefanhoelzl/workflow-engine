<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Workflow Engine</title>
  <link rel="stylesheet" href="/static/workflow-engine.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .auth-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .auth-brand .icon {
      width: 28px;
      height: 28px;
      font-size: 14px;
    }

    .auth-brand-name {
      font-size: 18px;
      font-weight: 700;
    }

    .auth-subtitle {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 32px;
    }

    .auth-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      color: white;
      background: #24292e;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .auth-btn:hover {
      background: #2f363d;
    }

    .auth-btn svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .auth-banner {
      max-width: 380px;
      width: 100%;
      margin-bottom: 16px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      text-align: center;
    }

    .auth-banner.info {
      background: var(--green-bg);
      border: 1px solid var(--green-border);
      color: var(--green);
      font-weight: 600;
    }

    .auth-banner.error {
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      color: var(--red);
    }
  </style>
</head>
<body>
  <div>
    <div class="auth-banner info" id="info-banner" hidden></div>
    <div class="auth-banner error" id="error-banner" hidden></div>

    <div class="auth-card">
      <div class="auth-brand">
        <span class="icon">W</span>
        <span class="auth-brand-name">Workflow Engine</span>
      </div>
      <p class="auth-subtitle">Sign in to continue</p>
      <form method="GET" action="{{.ProxyPrefix}}/start">
        <input type="hidden" name="rd" value="{{.Redirect}}">
        <button class="auth-btn" type="submit">
          <svg viewBox="0 0 16 16" role="img" aria-label="GitHub"><title>GitHub</title><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          Sign in with GitHub
        </button>
      </form>
    </div>
  </div>

  <script>
    "use strict";
    (() => {
      const params = new URLSearchParams(location.search);
      const error = params.get('error');
      const info = params.get('info');
      if (error) {
        const el = document.getElementById('error-banner');
        el.textContent = error;
        el.hidden = false;
      } else if (info) {
        const el = document.getElementById('info-banner');
        el.textContent = info;
        el.hidden = false;
      }
      if (error || info) {
        history.replaceState(null, '', location.pathname);
      }
    })();
  </script>
</body>
</html>
