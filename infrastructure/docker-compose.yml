services:
  app:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile
    environment:
      PERSISTENCE_PATH: /events
    volumes:
      - ../.persistence:/events
    expose:
      - "8080"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  proxy:
    image: caddy:2
    ports:
      - "8443:443"
    environment:
      XDG_DATA_HOME: /caddy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/caddy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
