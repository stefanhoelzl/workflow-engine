apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: {{ .Release.Namespace }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# All authentication and authorization is performed by the app itself (see
# packages/runtime/src/auth/*). Traefik terminates TLS and routes; it does
# not gate requests on auth. The app's Hono router owns every URL prefix —
# /dashboard, /trigger, /auth, /login, /static, /webhooks, /livez, /api,
# the root redirect /, and the 404/5xx responses for unknown paths. The
# main IngressRoute is therefore a single catch-all on the `websecure`
# entrypoint.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: workflow-engine
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.domain }}`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: {{ .Values.appServiceName }}
          port: {{ .Values.appServicePort }}
  {{- if .Values.tlsSecretName }}
  tls:
    secretName: {{ .Values.tlsSecretName }}
  {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: redirect-to-https
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      priority: 1
      middlewares:
        - name: redirect-to-https
      services:
        - name: noop@internal
          kind: TraefikService
