{{- if and .Values.tlsSecretName .Values.certIssuerName }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certName }}
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Values.tlsSecretName }}
  dnsNames:
    - {{ .Values.domain }}
  issuerRef:
    name: {{ .Values.certIssuerName }}
    kind: ClusterIssuer
    group: cert-manager.io
{{- end }}
