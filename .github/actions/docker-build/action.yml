name: Docker build
description: Build (and optionally push) the runtime image with GHA buildx cache.
inputs:
  push:
    description: Whether to push the built image.
    required: false
    default: "false"
  tags:
    description: Newline- or comma-separated tags. Required when push=true.
    required: false
    default: ""
  git_sha:
    description: Git SHA baked into the image (exposed at runtime via APP_GIT_SHA, surfaced on /readyz for deploy convergence checks).
    required: false
    default: ""
outputs:
  digest:
    description: sha256 digest of the pushed image (empty if push=false).
    value: ${{ steps.build.outputs.digest }}
runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@v4
    - id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        file: infrastructure/Dockerfile
        push: ${{ inputs.push }}
        tags: ${{ inputs.tags }}
        build-args: |
          GIT_SHA=${{ inputs.git_sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
