name: Plan infra

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: plan-infra-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [cluster, persistence]
    steps:
      - uses: actions/checkout@v6

      - uses: opentofu/setup-opentofu@v2

      - name: Tofu init
        working-directory: infrastructure/envs/${{ matrix.project }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_state_passphrase: ${{ secrets.TF_VAR_STATE_PASSPHRASE }}
          TF_VAR_upcloud_token: ${{ secrets.TF_VAR_UPCLOUD_TOKEN }}
          UPCLOUD_TOKEN: ${{ secrets.TF_VAR_UPCLOUD_TOKEN }}
        run: tofu init

      - name: Tofu plan
        working-directory: infrastructure/envs/${{ matrix.project }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_state_passphrase: ${{ secrets.TF_VAR_STATE_PASSPHRASE }}
          TF_VAR_upcloud_token: ${{ secrets.TF_VAR_UPCLOUD_TOKEN }}
          UPCLOUD_TOKEN: ${{ secrets.TF_VAR_UPCLOUD_TOKEN }}
        run: |
          {
            echo '### Tofu plan (${{ matrix.project }})'
            echo ''
            echo '```hcl'
          } >> "$GITHUB_STEP_SUMMARY"

          set +e
          tofu plan -detailed-exitcode -lock=false -no-color 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          plan_exit=${PIPESTATUS[0]}
          set -e

          echo '```' >> "$GITHUB_STEP_SUMMARY"

          exit "$plan_exit"
