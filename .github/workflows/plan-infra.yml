name: Plan infra

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: plan-infra-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: opentofu/setup-opentofu@v2

      - name: Tofu init
        working-directory: infrastructure
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_state_passphrase: ${{ secrets.TF_VAR_STATE_PASSPHRASE }}
        run: tofu init

      - name: Tofu plan
        working-directory: infrastructure
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_state_passphrase: ${{ secrets.TF_VAR_STATE_PASSPHRASE }}
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          TF_VAR_dynu_api_key: ${{ secrets.TF_VAR_DYNU_API_KEY }}
          TF_VAR_deploy_ssh_public_key: ${{ secrets.TF_VAR_DEPLOY_SSH_PUBLIC_KEY }}
          TF_VAR_deploy_ssh_private_key: ${{ secrets.TF_VAR_DEPLOY_SSH_PRIVATE_KEY }}
          TF_VAR_gh_oauth_client_id_prod: ${{ secrets.TF_VAR_GH_OAUTH_CLIENT_ID_PROD }}
          TF_VAR_gh_oauth_client_secret_prod: ${{ secrets.TF_VAR_GH_OAUTH_CLIENT_SECRET_PROD }}
          TF_VAR_gh_oauth_client_id_staging: ${{ secrets.TF_VAR_GH_OAUTH_CLIENT_ID_STAGING }}
          TF_VAR_gh_oauth_client_secret_staging: ${{ secrets.TF_VAR_GH_OAUTH_CLIENT_SECRET_STAGING }}
        run: |
          {
            echo '### Tofu plan'
            echo ''
            echo '```hcl'
          } >> "$GITHUB_STEP_SUMMARY"

          set +e
          tofu plan -detailed-exitcode -lock=false -no-color 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          plan_exit=${PIPESTATUS[0]}
          set -e

          echo '```' >> "$GITHUB_STEP_SUMMARY"

          # changes-allowed: false. Operator-applied; PR plan must be empty.
          # 0 = no changes (pass), 1 = error (fail), 2 = changes pending (fail —
          # operator hasn't applied the base change yet).
          exit "$plan_exit"

