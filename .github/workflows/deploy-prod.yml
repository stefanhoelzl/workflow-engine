name: Deploy prod

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Required-reviewer gate. The build+push step does not run until a
    # reviewer approves the run via the `production` environment in the UI.
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/deploy-image
        with:
          tag: release
          url: https://workflow-engine.webredirect.org
          github_token: ${{ secrets.GITHUB_TOKEN }}
