name: CI

on:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: opentofu/setup-opentofu@v2

      - run: pnpm install --frozen-lockfile
      - run: tofu -chdir=infrastructure/dev init

      - run: pnpm validate
      - run: pnpm build
